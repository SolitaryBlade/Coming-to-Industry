item.phase-fabric.name = 相位织料
item.phase-fabric.description = 拥有极好的电力特性及自我修复的能力，通常用于高级电子设备及自修复建筑。\n是一种处于金属/非金属叠加态的高级材料，可以用于捕获并定型非实体物质
liquid.slag.name = 低温熔岩
liquid.neoplasm.details = 瘤液。由一种无法控制并快速分裂的合成细胞团组成，具有污泥状的粘稠度。耐热。对任何含有水的结构极为危险。\n\n从标准分析来看过于复杂和不稳定，潜在的应用未知。建议在低温熔岩池中焚毁。

unit.atrax.description = 向地面目标发射带有削弱性的球状低温熔岩液。可以跨越大多数地形。

block.pyrolysis-generator.description = 使用低温熔岩热解芳油产生大量电力。同时产生水。
block.slag-incinerator.description = 焚烧稳定的物品和液体。需要低温熔岩。
block.surge-crucible.description = 用低温熔岩和硅合成巨浪合金。需要热量。
block.slag-heater.description = 加热朝向的建筑。需要低温熔岩。
block.disassembler.description = 以低效率将低温熔岩液分离成微量的外来矿物成分。能产生钍。
block.separator.description = 将低温熔岩液分离成矿物成分。
block.melter.description = 将废料熔化成低温熔岩液。
block.slag-centrifuge.name = 低温熔岩离心机
block.slag-incinerator.name = 低温熔岩焚化炉
block.slag-heater.name = 低温熔岩制热机
block.molten-slag.name = 低温熔岩液

sector.planetaryTerminal.description = 最终目标。\n\n这个海岸基地有一个能将核心发射到其它行星的设施，防守非常严密。\n\n生产海军单位，尽快消灭敌人，研究发射建筑。\n\n[red]从你占领这个区块的那一刻起，你将获得解锁最终科技的资格。

item.spore-pod.description = 一种非常危险的生物，部分区域进化体拥有群体意识，可以感染附近的其他物质，部分情况下还可以入侵智能系统，而且在没有其他液体并温度较高的情况下，数量较多时还能发生剧烈爆炸
item.spore-pod.details = [red]!!Warning!!\n低温已经完全无法消灭，并且现在仍然在持续适应高温，建议使用辐射武器。该物种拥有极强的进化能力，必须迅速寻找生物源，否则仅能采取灭星方法消灭[此方法会使该星球及附近等同于其三倍直径的范围完全原子化]\n!!Warning!!
item.thorium.details = 等级:T-C-8

