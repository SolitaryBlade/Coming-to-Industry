item.将至-合金板.details = 等级:B-7
item.将至-金刚石.name = 金刚石
item.将至-金刚石.description = 塞普罗目前天然生成的较硬的物质，是防御与弹药的不错之选\n[硬度:5]
item.将至-金刚石.details = 等级:B-4
item.将至-晶金.name = 晶状合金
item.将至-晶金.description = 一种晶体状的合金，同时也是一种各种属性都极佳的物品，再被轻度磕碰时容易破碎，但是受到强大冲击时强度较高
item.将至-晶金.details = 等级:B-6
item.将至-晶金板.name = 晶状合金板
item.将至-晶金板.description = 并联在一起的晶金板，由于添加了其他物品，在任何情况下硬度都高，貌似可以和其他板联合制造建筑
item.将至-晶金板.details = 等级:A-1
