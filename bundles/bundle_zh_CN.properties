item.将至-zs.name = 钻石
item.将至-zs.description = 被精细打磨并强化的金刚石，硬度很高，是个装饰的好材料，当然也可以当建材或者弹药
item.将至-zs.details = 被钻石砸死，敌人这辈子也是值了\n等级:A-0
item.将至-钯金.name = 钯金
item.将至-钯金.description = 一种银白色的物质，具有耐高温，耐腐蚀，高硬度的特点，缺点是极高硬度导致十分稀有，所以即使是在高端武器中也较少使用\n[硬度:10]
item.将至-钯金.details = 漂亮的金属，通常以锭的形态出现在人们面前，却被稀有挡住了大量使用（但是万物皆可弹药）\n等级:S-5
item.将至-钢.name = 钢
item.将至-钢.description = 铁矿的精加工物品，可用于大部分工业建设，当然做子弹也是个不错的选择
item.将至-钢.details = 等级:C-9
item.将至-钢化玻璃.name = 钢化玻璃
item.将至-钢化玻璃.description = 拥有超高硬度的玻璃，不但可以当建材，还可以用作炮塔的材料
item.将至-钢化玻璃.details = 等级:C-8
