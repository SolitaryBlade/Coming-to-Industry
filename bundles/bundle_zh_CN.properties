block.将至-A.name = 研究前置及背景介绍
block.将至-A.description = [red]测试\n此物品是对模组内科技的背景介绍\n\n[white]在进入游戏前，请详细阅读介绍\n\n[gold]一:[red]这是一个抱有猜想的未来现实发展预测性模组，如有任何疑问，请不要侮辱性的告知模组制作者或者周边人员\n\n[gold]二:[green]你是来自于一个被三大工业围剿所毁灭的星球的[blue]工业公司(弘昼重工)(Hz)[green]所研制的一个先驱型可进化人工智能\n\n由于原工业发现了YG的内部机密，被其召集另外两大工业所攻击，但即使是突然袭击，不过仍然让另外两工业损失惨重，但原工业没有布置其他防御力量，最终寡不敌众，而你是在\n被围剿战争的后期，星球上的工业力量所剩无几，星球处于崩溃的边缘时研制成功，所以他们将你放在[blue]星球能源核心(生命星球的根本，有无限的能源输出)[green]的附近,经过这多年间的不断自我进化，\n最终于宇宙历984年离开封存装置，你重回地表后发现曾经的星球大部分已经变成了一片废墟，而且还有三大工业的敌人徘徊在附近，你发现你可以直接获取其他工业的科技研究成果，而且自行归类一个科技树\n并且还发现了一个来自多年前原工业给你的任务，里面详细记录了YG想控制整个宇宙的野心，以及原工业试图阻止YG的计划，因为你是他们所制造的，所以你可以帮助他们完成这个特殊的任务\n\n[gold]三:战时宇宙历416年，现宇宙历985年\n\n[blue]-YG[green](宇宙通用型工业机械生产公司)有着极强的实力，并且其限制了整个宇宙的工业机械生产，有人类掌管实权，人工智能辅佐，原属[Hz]\n\n-[blue]-AH[green](尘埃核能及武器工业公司)一个注重于核能科技研究的集团，由人工智能操纵实权\n\n-[blue]-KT[green](卡塔星军事武器及机械公司)虽然实力较弱，但却有着极强的科研能力，却也被YG限制了工业机械生产，整体由人类掌管实权\n\n[blue]-Hz[green](阿克苏星弘昼重型机械工业)此为玩家原本的工业，在被毁灭之前是凌驾于宇宙绝大部分的工业公司之上，出现叛徒后衰落，仅次于YG，完全由人类主管，人工智能仅进行基本辅助\n\n[gold]四:[green]在Hz发现机密前按照三大工业巨头与玩家原所属工业公司的实力由强至弱划分[red](-YG-Hz-AH-KT-)\n[red]测试
