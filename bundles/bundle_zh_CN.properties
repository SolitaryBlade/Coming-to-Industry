block.将至-A2.description = [YG]关于未来熔毁级科技产品的研究前置
block.将至-测试墙.name = 墙
block.将至-测试墙.description = [red]沙盒专属墙，无敌
block.将至-秒杀炮.name = 沙盒秒杀炮
block.将至-秒杀炮.description = 发射一枚秒杀敌人的子弹，防止一放就游戏结束，所以范围几乎为零

block.将至-A131.name = A131-轨道
block.将至-A131.description = 来自[AH],在其发现新矿后迅速投入研究的一款全新武器\n使用一种融合合金作为弹药，可以对目标造成十分恐怖的湮灭化打击\n发射一道随方向变化的球形光束攻击远处敌方单位\n由于其特殊性，[AH]并没有把它正式投入战争，但是至于会不会被[YG]运用到战争就不确定了
block.将至-A131.details = A131-代号:轨道湮灭
block.将至-M220.name = M220型机炮防御系统
block.将至-M220.description = 源自[Hz]，改良自[YG]，[Hz]利用高稀金属所研制的，集攻击与防御于一体的毁灭级建筑，其恐怖的火力能够毁灭范围内的一切，但是由于其研制时间过早，即使有YG的改良，我们也不能确定是否能够独自消灭T7级单位
block.将至-大型轨道炮.name = 离子电浆炮
block.将至-核弹.name = 核弹发射器
block.将至-核弹.description = 来自[AH]，发射一枚恐怖的纯铀核弹头，拥有无与伦比的伤害及恐怖的建筑毁灭能力
block.将至-核弹.details = 你觉得你会怎么死
block.将至-终末.name = 终末激光塔
block.将至-终末.description = 来自[YG]的终极毁灭级武器，至少在他们发现全新矿物之前是的，其所需电力是一个天文数字，发射一道极为恐怖的持续熔毁激光
block.将至-终末.details = “我转一圈你不就没了吗？”\n妥妥电力黑洞，液体黑洞

