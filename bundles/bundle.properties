//TestBlock
block.将至-A.name = Introduction to Research Preposition and Background
block.将至-A.description = [red] Test\nI'm not sure if the translation is accurate.If there is any abnormality. Please forgive me. \nThis item is a background introduction to the technology in the module \n\n [white] Before entering the game, please read the introduction carefully \n\n [gold] 1: [red] This is a predictive module with conjecture about the future reality. If you have any questions, Please don't tell the module maker or the surrounding people insultingly \n\n [gold] 2: [green] You are from a planet that has been destroyed by the three major industries.A pioneer evolvable artificial intelligence developed by [blue] Industrial Company (Hongzhou Heavy Industries) (Hz) [green] was attacked by two other industries called by the original industry because it discovered the internal secrets of [YG], but even if it was a sudden attack, it still caused heavy losses to the other two industries, but the original industry did not deploy other defensive forces. Ultimately outnumbered, and you developed it \n at the end of the war, when the planet's industrial power was running out and the planet was on the verge of collapse.So they put you near [green], the energy core of the [blue] planet (the root of the living planet, with unlimited energy output), and after years of continuous self-evolution, you finally left the storage device in the year 984 of the cosmic calendar, and when you returned to the surface, you found that most of the former planet had been reduced to ruins. And with the enemies of the three major industries hovering nearby, you find that you can directly access the scientific and technological research results of other industries, and self-classify a scientific and technological tree, and also find a new one from the original industry many years ago.\nAnd also found a task from the original industry many years ago, which details YG's ambition to control the entire universe, and the original industry's plan to try to stop YG, because you are made by them, so you can help them complete this special task \n\n [gold]3: War Universe Calendar 416. In the year 985 of the current cosmic calendar, \n\n [blue]-YG [green] (Universal Industrial Machinery Production Company) has a very strong strength, and it limits the production of industrial machinery in the entire universe, with human beings in charge of real power and artificial intelligence assisting. Originally [Hz] \n\n[blue]-AH [green] (Dust Nuclear and Weapons Industries), a group focused on nuclear energy technology research, controlled by artificial intelligence.\n\n[blue]-KT [green] (Kata Star Military Weapons and Machinery Company) is weak, but it has a strong scientific research capability, but it is also restricted by [YG] in the production of industrial machinery. Humans are in charge of the real power as a whole \n\n [blue]-Hz [green] (Aksu Star Day Heavy Machinery Industry) This is the original industry of the player. Before it was destroyed, it was above most of the industrial companies in the universe. After the emergence of traitors, it declined, second only to [YG], and was completely in charge of humans. Artificial intelligence only carries out basic assistance \n\n [gold] 4: [green] Before Hz discovers the secret, it is divided into [red] (-YG-Hz-AH-KT-) \n\n [red] tests
